server {
    listen 80;

    # Halaman utama: penjelasan singkat routing yang tersedia
    location = / {
        default_type text/html;
        return 200 "<h1>Sistem Manajemen Logistik dan Distribusi Kargo Nasional</h1><p>Coba akses:</p><ul><li><a href='/barat/'>/barat/</a></li><li><a href='/tengah/'>/tengah/</a></li><li><a href='/timur/'>/timur/</a></li></ul>";
    }

    # Routing ke Region Barat
    location /barat/ {
        proxy_pass http://web-barat/;
        proxy_set_header Host $host;
        proxy_set_header X-Region "Barat";
    }

    # Routing ke Region Tengah
    location /tengah/ {
        proxy_pass http://web-tengah/;
        proxy_set_header Host $host;
        proxy_set_header X-Region "Tengah";
    }

    # Routing ke Region Timur
    location /timur/ {
        proxy_pass http://web-timur/;
        proxy_set_header Host $host;
        proxy_set_header X-Region "Timur";
    }
}